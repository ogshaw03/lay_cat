<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>LayCAT 監査ログ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0d0d0f;--bg2:#141416;--bg3:#1c1c1f;--bg4:#232327;
    --border:#2a2a2f;--border2:#3a3a42;
    --text:#e8e8ec;--text2:#9a9aaa;--text3:#5a5a6a;
    --accent:#c7c7cf;--accent2:#e8e8ec;--green:#7fbf9a;--amber:#d6a95f;--red:#e06a6a;--blue:#6a9fe0;
    --radius:10px;--radius2:6px;
    --font:'Noto Sans JP',system-ui,-apple-system,"Segoe UI",sans-serif;
    --font-head:'Syne',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:13px}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer}
  .btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);padding:7px 12px;border-radius:var(--radius2);font-size:12px;transition:.15s;white-space:nowrap}
  .btn:hover{background:var(--bg4)}
  .btn-primary{background:#ececf0;border-color:#ececf0;color:#16161a;font-weight:600}
  .btn-primary:hover{background:#fff}
  .btn-sm{padding:4px 9px;font-size:11px}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  input,select{font-family:inherit;background:var(--bg);border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:var(--radius2);font-size:12px}
  input:focus,select:focus{outline:none;border-color:var(--accent)}

  .overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:1000;padding:24px;text-align:center}
  .title-big{font-family:var(--font-head);font-size:26px;font-weight:800;letter-spacing:1px}
  .title-big .sub{color:var(--accent)}
  .muted{color:var(--text3);font-size:13px;line-height:1.7;max-width:460px}

  .topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:14px;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
  .brand{font-family:var(--font-head);font-weight:800;font-size:16px;letter-spacing:.5px}
  .brand .sub{color:var(--accent)}
  .spacer{flex:1}
  .user-chip{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
  .user-chip img{width:28px;height:28px;border-radius:50%;background:var(--bg4)}

  .wrap{max-width:1400px;margin:0 auto;padding:16px 20px 60px}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .card-title{font-family:var(--font-head);font-size:14px;font-weight:700;margin-bottom:6px}

  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .filters label{display:flex;flex-direction:column;gap:3px;font-size:10px;color:var(--text3)}
  .filters input,.filters select{min-width:110px}
  .fx-actions{display:flex;gap:6px;margin-left:auto;align-items:flex-end}

  .meta{font-size:11px;color:var(--text3);margin-bottom:8px}
  .meta b{color:var(--text2)}

  .tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius2);background:var(--bg3)}
  table{width:100%;border-collapse:collapse;font-size:11px;font-family:monospace}
  th,td{padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top;white-space:nowrap}
  th{background:var(--bg4);color:var(--text2);font-weight:700;position:sticky;top:0;font-size:10px;letter-spacing:.5px;text-transform:uppercase}
  td.wrap{white-space:normal;word-break:break-all;max-width:400px}
  tr:hover td{background:rgba(255,255,255,.03)}

  .badge{display:inline-block;padding:1px 7px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.3px}
  .badge.m-get{background:rgba(106,159,224,.15);color:var(--blue);border:1px solid rgba(106,159,224,.35)}
  .badge.m-put{background:rgba(127,191,154,.15);color:var(--green);border:1px solid rgba(127,191,154,.35)}
  .badge.m-post{background:rgba(127,191,154,.15);color:var(--green);border:1px solid rgba(127,191,154,.35)}
  .badge.m-del{background:rgba(224,106,106,.15);color:var(--red);border:1px solid rgba(224,106,106,.35)}
  .badge.s-2{background:rgba(127,191,154,.12);color:var(--green)}
  .badge.s-3{background:rgba(214,169,95,.12);color:var(--amber)}
  .badge.s-4,.badge.s-5{background:rgba(224,106,106,.16);color:var(--red);border:1px solid rgba(224,106,106,.35)}
  .empty{color:var(--text3);padding:24px;text-align:center;font-size:12px}

  /* グループ表示 */
  .grp{margin-bottom:10px;border:1px solid var(--border);border-radius:var(--radius2);background:var(--bg3);overflow:hidden}
  .grp-h{display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--bg4);cursor:pointer;font-size:12px;user-select:none}
  .grp-h:hover{background:#2a2a30}
  .grp-h .caret{display:inline-block;width:10px;transition:transform .12s}
  .grp.open .grp-h .caret{transform:rotate(90deg)}
  .grp-h .pid{font-family:monospace;font-weight:700;color:var(--text)}
  .grp-h .count{color:var(--text2);font-size:11px}
  .grp-h .lastts{margin-left:auto;color:var(--text3);font-size:11px;font-family:monospace}
  .grp-body{display:none;padding:0}
  .grp.open .grp-body{display:block}
  .grp-body table{background:var(--bg3)}
  .grp-body th{background:var(--bg3);font-size:9px}
  .grp-body td{font-size:11px}
  .grp-h .warn{color:var(--red);font-weight:700}
  .grp-h .ok{color:var(--green)}
  .grp-h .deleted{color:var(--red);font-weight:700;background:rgba(224,106,106,.15);padding:2px 8px;border-radius:8px;border:1px solid rgba(224,106,106,.35)}
  .grp.deleted-grp .pid{color:var(--text3);text-decoration:line-through}
  .mode-toggle{display:inline-flex;gap:0;border:1px solid var(--border2);border-radius:var(--radius2);overflow:hidden}
  .mode-toggle button{background:var(--bg3);color:var(--text2);border:none;padding:6px 12px;font-size:11px;cursor:pointer;font-family:inherit}
  .mode-toggle button.act{background:#ececf0;color:#16161a;font-weight:700}

  /* 操作ラベル */
  .op{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;white-space:nowrap}
  .op .emo{font-size:12px}
  .op.op-green{color:#7fbf9a}
  .op.op-blue{color:#6a9fe0}
  .op.op-amber{color:#d6a95f}
  .op.op-red{color:#e06a6a}
  .op.op-mute{color:#9a9aaa}

  .notification{position:fixed;bottom:24px;right:24px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius);padding:11px 16px;font-size:13px;z-index:2000;display:none;max-width:340px;box-shadow:0 8px 30px rgba(0,0,0,.5)}
</style>
</head>
<body>

<div class="overlay" id="loadingOverlay"><div class="muted">読み込み中...</div></div>

<div class="overlay hidden" id="loginScreen">
  <div class="title-big">LayCAT <span class="sub">監査ログ</span></div>
  <div class="muted">運営（operatorEmails）専用のコンソールです。運営権限アカウントでログインしてください。管理者権限では閲覧できません。</div>
  <button class="btn btn-primary" id="loginBtn">Google でログイン</button>
</div>

<div class="overlay hidden" id="denyScreen">
  <div class="title-big">⚠ 権限がありません</div>
  <div class="muted" id="denyMsg"></div>
  <div style="display:flex;gap:8px"><a href="access-console.html" class="btn">アクセス管理へ</a><button class="btn" id="denyLogout">ログアウト</button></div>
</div>

<div id="console" class="hidden">
  <div class="topbar">
    <div class="brand">LayCAT <span class="sub">監査ログ</span></div>
    <a href="access-console.html" class="btn btn-sm">← アクセス管理へ戻る</a>
    <div class="spacer"></div>
    <div class="user-chip" id="userChip"></div>
    <button class="btn btn-sm" id="logoutBtn">ログアウト</button>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="card-title">🔍 フィルタ</div>
      <div class="filters">
        <label>件数上限
          <select id="fLimit">
            <option value="100">100 件</option>
            <option value="300" selected>300 件</option>
            <option value="1000">1000 件</option>
            <option value="3000">3000 件</option>
          </select>
        </label>
        <label>開始日時
          <input id="fFrom" type="datetime-local">
        </label>
        <label>終了日時
          <input id="fTo" type="datetime-local">
        </label>
        <label>メソッド
          <select id="fMethod">
            <option value="">すべて</option>
            <option value="GET">GET</option>
            <option value="PUT">PUT</option>
            <option value="POST">POST</option>
            <option value="DELETE">DELETE</option>
          </select>
        </label>
        <label>ステータス
          <select id="fStatus">
            <option value="">すべて</option>
            <option value="2xx">2xx (成功)</option>
            <option value="4xx">4xx (拒否)</option>
            <option value="5xx">5xx (エラー)</option>
          </select>
        </label>
        <label>プロジェクトID（部分一致）
          <input id="fPid" type="text" placeholder="proj_...">
        </label>
        <label>メール（部分一致）
          <input id="fEmail" type="text" placeholder="user@...">
        </label>
        <label>パス（部分一致）
          <input id="fPath" type="text" placeholder="/api/r2/...">
        </label>
        <div class="fx-actions">
          <button class="btn btn-primary" id="applyBtn">🔍 検索</button>
          <button class="btn" id="resetBtn">リセット</button>
          <button class="btn" id="csvBtn">📥 CSV</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div class="card-title" style="margin:0">📋 監査ログ</div>
        <div style="flex:1"></div>
        <div class="mode-toggle" id="modeToggle">
          <button data-mode="group" class="act">プロジェクトごと</button>
          <button data-mode="flat">時系列</button>
        </div>
      </div>
      <div class="meta" id="meta">読み込み中…</div>
      <!-- グループ表示 -->
      <div id="groupView"></div>
      <!-- 時系列表示（従来の table） -->
      <div id="flatView" class="hidden">
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>時刻 (UTC)</th>
                <th>操作</th>
                <th>Status</th>
                <th>Email</th>
                <th>PID</th>
                <th>Key</th>
                <th>Dur</th>
                <th>IP</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="notification" id="notification"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, collection, query, orderBy, limit as fsLimit, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={apiKey:"AIzaSyBn9TFT7lMdEVcatGo6v_qzIPXeDay5Cvw",authDomain:"laycat-54ee4.firebaseapp.com",projectId:"laycat-54ee4",storageBucket:"laycat-54ee4.firebasestorage.app",messagingSenderId:"1016486781774",appId:"1:1016486781774:web:f41f9546fd47e73774b41f"};
const CFG_PATH=['laynaAccess','config'];

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();

const $=s=>document.querySelector(s);
const notify=(m)=>{const n=$('#notification');n.textContent=m;n.style.display='block';setTimeout(()=>n.style.display='none',3200)};

let currentUser=null;
let currentCfg=null;

$('#loginBtn').onclick=async()=>{try{await signInWithPopup(auth,provider)}catch(e){notify('ログイン失敗：'+e.message)}};
$('#logoutBtn').onclick=()=>signOut(auth);
$('#denyLogout').onclick=()=>signOut(auth);

onAuthStateChanged(auth,async(u)=>{
  $('#loadingOverlay').classList.add('hidden');
  if(!u){$('#loginScreen').classList.remove('hidden');$('#console').classList.add('hidden');$('#denyScreen').classList.add('hidden');return}
  currentUser=u;
  $('#loginScreen').classList.add('hidden');
  // 権限チェック：operatorEmails（運営）のみ許可。管理者権限では閲覧不可（セキュリティ最優先）。
  try{
    const snap=await getDoc(doc(db,...CFG_PATH));
    if(!snap.exists()){throw new Error('laynaAccess/config が未作成です')}
    currentCfg=snap.data();
    const operators=(currentCfg.operatorEmails||[]).map(x=>String(x).toLowerCase());
    if(!operators.includes(String(u.email||'').toLowerCase())){
      $('#denyMsg').textContent=u.email+' は運営（operatorEmails）に登録されていません。監査ログは最上位権限（運営）のみアクセス可能で、管理者権限では閲覧できません。';
      $('#denyScreen').classList.remove('hidden');
      return;
    }
    $('#denyScreen').classList.add('hidden');
    $('#console').classList.remove('hidden');
    $('#userChip').innerHTML='<img src="'+(u.photoURL||'')+'" alt=""> '+(u.displayName||u.email);
    // 初期ロード
    await loadAudit();
  }catch(e){
    $('#denyMsg').textContent='設定を読み込めませんでした: '+e.message;
    $('#denyScreen').classList.remove('hidden');
  }
});

let allRows=[];

async function loadAudit(){
  const meta=$('#meta');const tb=$('#tbody');
  meta.textContent='読み込み中…';tb.innerHTML='';
  const lim=parseInt($('#fLimit').value)||300;
  try{
    // Firestore: laynaAudit を ts 降順で最新 N 件取得
    const q=query(collection(db,'laynaAudit'),orderBy('ts','desc'),fsLimit(lim));
    const snap=await getDocs(q);
    allRows=[];
    snap.forEach(d=>{const x=d.data();allRows.push({id:d.id,...x})});
    renderRows();
  }catch(e){
    meta.textContent='読み込みエラー: '+e.message;
    console.error(e);
  }
}

let viewMode='group';
document.querySelectorAll('#modeToggle button').forEach(b=>{
  b.onclick=()=>{
    viewMode=b.dataset.mode;
    document.querySelectorAll('#modeToggle button').forEach(x=>x.classList.toggle('act',x===b));
    $('#groupView').classList.toggle('hidden',viewMode!=='group');
    $('#flatView').classList.toggle('hidden',viewMode!=='flat');
    renderRows();
  };
});

/* パスから projects/<pid>/ プレフィックスを除いた短縮キーを返す */
function shortKey(r){
  const raw=r.key||r.path||'';
  if(r.pid&&r.pid!=='-'){
    const pre='projects/'+r.pid+'/';
    if(raw.startsWith(pre))return raw.slice(pre.length);
  }
  return raw;
}

/* Method + key + extra から「何の操作か」を推定 */
function classifyOp(r){
  const key=r.key||r.path||'';
  const m=(r.method||'').toUpperCase();
  const status=String(r.status||'');
  const extra=String(r.extra||'');
  const isErr=/^[45]/.test(status);
  if(isErr){
    if(status==='401')return{emo:'⛔',label:'認証失敗',color:'red'};
    if(status==='403')return{emo:'⛔',label:'アクセス拒否',color:'red'};
    if(status==='404')return{emo:'❓',label:'見つからない',color:'amber'};
    if(status==='413')return{emo:'⚠️',label:'サイズ上限超過',color:'red'};
    return{emo:'⚠️',label:'エラー('+status+')',color:'red'};
  }
  /* プロジェクト削除（purge）*/
  if(m==='DELETE'&&/^\/api\/r2\/purge\//.test(r.path||''))return{emo:'🗑',label:'プロジェクト削除',color:'red'};
  /* _access.json */
  if(/\/_access\.json$/.test(key)){
    if(m==='PUT'&&extra.includes('bootstrap=1'))return{emo:'🚀',label:'プロジェクト作成',color:'green'};
    if(m==='PUT')return{emo:'👥',label:'メンバー／権限変更',color:'blue'};
    if(m==='DELETE')return{emo:'🗑',label:'ACL 削除',color:'red'};
    if(m==='GET')return{emo:'👁',label:'ACL 確認',color:'mute'};
  }
  /* /api/r2/mine */
  if(/^\/api\/r2\/mine/.test(r.path||''))return{emo:'📋',label:'プロジェクト一覧取得',color:'mute'};
  if(/^\/api\/r2\/rebuild-memberships/.test(r.path||''))return{emo:'🔄',label:'メンバーシップ再構築',color:'blue'};
  /* 動画・画像・EXR */
  if(/\/media\/.+\.(mp4|mov|webm|avi|mkv|m4v)$/i.test(key)){
    if(m==='DELETE')return{emo:'🗑',label:'動画削除',color:'red'};
    if(m==='PUT')return{emo:'🎬',label:'動画アップロード',color:'green'};
    return{emo:'🎬',label:'動画取得',color:'mute'};
  }
  if(/\/media\/.+\.(jpg|jpeg|png|gif|webp)$/i.test(key)){
    if(m==='DELETE')return{emo:'🗑',label:'画像削除',color:'red'};
    if(m==='PUT')return{emo:'🖼',label:'画像アップロード',color:'green'};
    return{emo:'🖼',label:'画像取得',color:'mute'};
  }
  if(/\/media\/.+\.exr$/i.test(key)){
    if(m==='DELETE')return{emo:'🗑',label:'EXR 削除',color:'red'};
    if(m==='PUT')return{emo:'🎨',label:'EXR アップロード',color:'green'};
    return{emo:'🎨',label:'EXR 取得',color:'mute'};
  }
  if(/\/media\//.test(key)){
    if(m==='DELETE')return{emo:'🗑',label:'メディア削除',color:'red'};
    if(m==='PUT')return{emo:'📎',label:'メディアアップロード',color:'green'};
    return{emo:'📎',label:'メディア取得',color:'mute'};
  }
  /* サムネイル */
  if(/\/thumbnails\//.test(key)){
    if(m==='DELETE')return{emo:'🗑',label:'サムネ削除',color:'red'};
    if(m==='PUT')return{emo:'🖼',label:'サムネ生成',color:'blue'};
    return{emo:'🖼',label:'サムネ取得',color:'mute'};
  }
  /* ショット（Phase 2 分割保存）→ コメント・アノテ・版追加 */
  if(/\/shots\/[^/]+\.json$/.test(key)){
    if(m==='DELETE')return{emo:'🗑',label:'ショット削除',color:'red'};
    if(m==='PUT')return{emo:'💬',label:'コメント／アノテ／版更新',color:'blue'};
    return{emo:'💬',label:'ショット読取',color:'mute'};
  }
  /* サブミット（Phase 1 分割保存）*/
  if(/\/submits\/[^/]+\.json$/.test(key)){
    if(m==='DELETE')return{emo:'🗑',label:'サブミット削除',color:'red'};
    if(m==='PUT')return{emo:'📮',label:'サブミット保存',color:'blue'};
    return{emo:'📮',label:'サブミット読取',color:'mute'};
  }
  /* REEL */
  if(/\/reels\/.+\.json$/.test(key)){
    if(m==='DELETE')return{emo:'🗑',label:'REEL 削除',color:'red'};
    if(m==='PUT')return{emo:'🎞',label:'REEL 保存',color:'blue'};
    return{emo:'🎞',label:'REEL 読取',color:'mute'};
  }
  /* プロジェクト骨格 */
  if(/\/laycat\.project\.json$/.test(key)){
    if(m==='DELETE')return{emo:'🗑',label:'プロジェクト骨格削除',color:'red'};
    if(m==='PUT')return{emo:'🗂',label:'プロジェクト構造更新',color:'blue'};
    return{emo:'🗂',label:'プロジェクト骨格読取',color:'mute'};
  }
  /* fallback */
  return{emo:'❓',label:m+' '+shortKey(r).slice(0,30),color:'mute'};
}

/* 全ログから「削除されたプロジェクト ID」の集合を検出 */
function detectDeletedPids(rows){
  const s=new Set();
  for(const r of rows){
    if(r.method==='DELETE'&&String(r.status||'').startsWith('2')&&/^\/api\/r2\/purge\/projects\/[^/]+\/$/.test(r.path||'')){
      if(r.pid&&r.pid!=='-')s.add(r.pid);
    }
  }
  return s;
}
function opCell(r){
  const c=classifyOp(r);
  return '<span class="op op-'+c.color+'"><span class="emo">'+c.emo+'</span>'+esc(c.label)+'</span>';
}

function applyFilters(){
  const fm=$('#fMethod').value.trim();
  const fs=$('#fStatus').value.trim();
  const fp=$('#fPid').value.trim().toLowerCase();
  const fe=$('#fEmail').value.trim().toLowerCase();
  const fpath=$('#fPath').value.trim().toLowerCase();
  const fromV=$('#fFrom').value.trim();
  const toV=$('#fTo').value.trim();
  const fromT=fromV?new Date(fromV).getTime():null;
  const toT=toV?new Date(toV).getTime():null;
  return allRows.filter(r=>{
    if(fm&&r.method!==fm)return false;
    if(fs){
      const s=String(r.status||'');
      if(fs==='2xx'&&!s.startsWith('2'))return false;
      if(fs==='4xx'&&!s.startsWith('4'))return false;
      if(fs==='5xx'&&!s.startsWith('5'))return false;
    }
    if(fp&&!(r.pid||'').toLowerCase().includes(fp))return false;
    if(fe&&!(r.email||'').toLowerCase().includes(fe))return false;
    if(fpath&&!(r.path||'').toLowerCase().includes(fpath))return false;
    const t=r.ts?new Date(r.ts).getTime():0;
    if(fromT!=null&&t<fromT)return false;
    if(toT!=null&&t>toT)return false;
    return true;
  });
}

function renderRows(){
  const meta=$('#meta');
  const rows=applyFilters();
  meta.textContent=allRows.length+' 件取得 → '+rows.length+' 件表示（表示モード: '+(viewMode==='group'?'プロジェクトごと':'時系列')+'）';
  if(viewMode==='group'){renderGrouped(rows)}else{renderFlat(rows)}
}

function renderFlat(rows){
  const tb=$('#tbody');
  tb.innerHTML='';
  if(!rows.length){tb.innerHTML='<tr><td colspan="8" class="empty">条件に一致する監査ログがありません</td></tr>';return}
  const deleted=detectDeletedPids(allRows);
  const frag=document.createDocumentFragment();
  for(const r of rows){
    const tr=document.createElement('tr');
    const status=String(r.status||'');
    const sclass='s-'+(status[0]||'2');
    const pidCell=(r.pid&&r.pid!=='-'&&deleted.has(r.pid))
      ? esc(r.pid)+' <span class="op op-red" style="font-size:9px">🗑削除済</span>'
      : esc(r.pid||'-');
    tr.innerHTML=
      '<td>'+esc(fmtTs(r.ts))+'</td>'+
      '<td>'+opCell(r)+'</td>'+
      '<td><span class="badge '+sclass+'">'+esc(status)+'</span></td>'+
      '<td>'+esc(r.email||'-')+'</td>'+
      '<td>'+pidCell+'</td>'+
      '<td class="wrap">'+esc(shortKey(r))+'</td>'+
      '<td>'+esc((r.dur!=null?r.dur+'ms':'-'))+'</td>'+
      '<td>'+esc(r.ip||'-')+'</td>';
    frag.appendChild(tr);
  }
  tb.appendChild(frag);
}

function renderGrouped(rows){
  const wrap=$('#groupView');
  wrap.innerHTML='';
  if(!rows.length){wrap.innerHTML='<div class="empty">条件に一致する監査ログがありません</div>';return}
  const deleted=detectDeletedPids(allRows);
  /* PID でグループ化。PID なし（例: /api/r2/mine）は "-" グループに集約 */
  const groups=new Map();
  for(const r of rows){
    const k=r.pid||'-';
    if(!groups.has(k))groups.set(k,[]);
    groups.get(k).push(r);
  }
  /* 各グループを最新イベントの ts 降順で並べる */
  const sorted=[...groups.entries()].map(([pid,list])=>{
    list.sort((a,b)=>(new Date(b.ts||0))-(new Date(a.ts||0)));
    return {pid,list,latest:list[0]?.ts||''};
  }).sort((a,b)=>(new Date(b.latest||0))-(new Date(a.latest||0)));

  const frag=document.createDocumentFragment();
  for(const g of sorted){
    const errN=g.list.filter(r=>String(r.status||'').match(/^[45]/)).length;
    const putN=g.list.filter(r=>r.method==='PUT').length;
    const delN=g.list.filter(r=>r.method==='DELETE').length;
    const isDeleted=g.pid!=='-'&&deleted.has(g.pid);
    /* このグループ内の主な操作をサマリ表示（プロジェクト作成／動画アップ／コメント記入 の件数）*/
    const opCounts={};
    for(const r of g.list){
      const c=classifyOp(r);
      if(c.color==='mute')continue; /* 読取・キャッシュ確認は主要操作としてカウントしない */
      opCounts[c.label]=(opCounts[c.label]||0)+1;
    }
    const opSummary=Object.entries(opCounts).sort((a,b)=>b[1]-a[1]).slice(0,4)
      .map(([lab,n])=>esc(lab)+' × '+n).join(' · ');
    const grp=document.createElement('div');grp.className='grp'+(isDeleted?' deleted-grp':'');
    const h=document.createElement('div');h.className='grp-h';
    h.innerHTML='<span class="caret">▸</span>'+
      '<span class="pid">'+esc(g.pid)+'</span>'+
      (isDeleted?'<span class="deleted">🗑 削除済み</span>':'')+
      '<span class="count">'+g.list.length+' 件'+(opSummary?' · <span style="color:var(--text)">'+opSummary+'</span>':'')+(errN?' · <span class="warn">ERR '+errN+'</span>':'')+'</span>'+
      '<span class="lastts">最新: '+esc(fmtTs(g.latest))+'</span>';
    h.onclick=()=>grp.classList.toggle('open');
    grp.appendChild(h);
    /* エラーがあるグループは自動で開いておく */
    if(errN>0)grp.classList.add('open');
    const body=document.createElement('div');body.className='grp-body';
    const tbl=document.createElement('div');tbl.className='tbl-wrap';
    let html='<table><thead><tr><th>時刻(UTC)</th><th>操作</th><th>Status</th><th>Email</th><th>Key</th><th>Dur</th></tr></thead><tbody>';
    for(const r of g.list){
      const status=String(r.status||'');
      const sclass='s-'+(status[0]||'2');
      html+='<tr>'+
        '<td>'+esc(fmtTs(r.ts))+'</td>'+
        '<td>'+opCell(r)+'</td>'+
        '<td><span class="badge '+sclass+'">'+esc(status)+'</span></td>'+
        '<td>'+esc(r.email||'-')+'</td>'+
        '<td class="wrap">'+esc(shortKey(r))+'</td>'+
        '<td>'+esc((r.dur!=null?r.dur+'ms':'-'))+'</td>'+
        '</tr>';
    }
    html+='</tbody></table>';
    tbl.innerHTML=html;
    body.appendChild(tbl);
    grp.appendChild(body);
    frag.appendChild(grp);
  }
  wrap.appendChild(frag);
}

function fmtTs(iso){if(!iso)return'-';return String(iso).replace('T',' ').replace(/\.\d+Z$/,'Z').replace('Z',' Z')}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

$('#applyBtn').onclick=()=>{loadAudit()};
$('#resetBtn').onclick=()=>{['fMethod','fStatus','fPid','fEmail','fPath','fFrom','fTo'].forEach(id=>{$('#'+id).value=''});loadAudit()};
['fMethod','fStatus','fPid','fEmail','fPath','fFrom','fTo'].forEach(id=>{$('#'+id).addEventListener('change',renderRows);$('#'+id).addEventListener('input',renderRows)});

$('#csvBtn').onclick=()=>{
  const rows=Array.from($('#tbody').querySelectorAll('tr'));
  if(!rows.length||rows[0].querySelector('.empty')){notify('エクスポートするデータがありません');return}
  const hdr=['ts','method','status','email','pid','key','path','dur','ip','ua','extra'];
  const lines=[hdr.join(',')];
  for(const r of allRows){
    const cells=hdr.map(k=>{const v=String(r[k]==null?'':r[k]);return '"'+v.replace(/"/g,'""')+'"'});
    lines.push(cells.join(','));
  }
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='laycat_audit_'+new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
};
</script>
</body>
</html>
